# backup.conf - Configuration for backup.sh

SOURCE_DIRS=(
    # Takes multiple directories, each one as a string.
    "/path/to/source/destination1" "/path/to/source/destination2"
)

BACKUP_DEST="/path/to/backup/destination"

# Number of days to keep backups. Files older than this are deleted.
# This is set to 7 days by default. You can change it to any number of days you prefer.
# Leave empty ("") to disable automatic deletion entirely.
RETENTION_DAYS=7

LOG_DIR="./logs"

# Email notification (optional, leave empty to disable)
# Requires the 'mail' command to be installed and configured.
NOTIFY_EMAIL=""